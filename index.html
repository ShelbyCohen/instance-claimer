<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<meta name="robots" content="noindex">
<title>ServiceNow Workshop — Claim Your Instance</title>
<style>
  :root {
    --bg-1: #0b1220;
    --bg-2: #1a2a44;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #16a34a;
    --accent-hover: #15803d;
    --accent-soft: #dcfce7;
    --secondary: #f1f5f9;
    --secondary-hover: #e2e8f0;
    --border: #e2e8f0;
    --error: #dc2626;
    --error-soft: #fee2e2;
    --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top, var(--bg-2) 0%, var(--bg-1) 70%);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--card);
    width: 100%;
    max-width: 460px;
    border-radius: var(--radius);
    padding: 32px 24px;
    box-shadow: var(--shadow);
  }

  .state {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    text-align: center;
    gap: 16px;
  }

  .hidden { display: none !important; }

  h1.title {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  p.subtitle {
    margin: 0;
    color: var(--muted);
    font-size: 1rem;
  }

  p.instruction {
    margin: 8px 0 4px;
    color: var(--text);
    font-size: 1rem;
  }

  .btn-primary, .btn-secondary {
    appearance: none;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 600;
    font-size: 1.0625rem;
    padding: 18px 20px;
    cursor: pointer;
    transition: background-color 120ms ease, transform 80ms ease;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    margin-top: 12px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary:focus-visible { outline: 3px solid #86efac; outline-offset: 2px; }

  .btn-secondary {
    background: var(--secondary);
    color: var(--text);
  }
  .btn-secondary:hover { background: var(--secondary-hover); }
  .btn-secondary:active { transform: scale(0.99); }
  .btn-secondary:focus-visible { outline: 3px solid #94a3b8; outline-offset: 2px; }

  .btn-icon {
    appearance: none;
    border: 1px solid var(--border);
    background: white;
    color: var(--text);
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background-color 120ms ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-icon:hover { background: var(--secondary); }
  .btn-icon:focus-visible { outline: 2px solid #94a3b8; outline-offset: 2px; }

  /* Loading spinner */
  .spinner {
    width: 56px;
    height: 56px;
    border: 5px solid var(--secondary);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 16px auto 4px;
    animation: spin 800ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-msg { margin: 0; color: var(--muted); font-size: 1rem; }

  /* Result state */
  .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 2rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 4px;
  }

  .instance-label {
    margin: 0;
    color: var(--muted);
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .instance-number {
    margin: 0 0 8px;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .field {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--secondary);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: left;
  }

  .field-label {
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    flex-shrink: 0;
    width: 76px;
  }

  .field-value {
    flex: 1;
    color: var(--text);
    font-size: 0.9375rem;
    word-break: break-all;
    min-width: 0;
  }

  .field-value.mono {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.9375rem;
  }

  a.link {
    color: #1d4ed8;
    text-decoration: none;
    font-weight: 600;
  }
  a.link:hover { text-decoration: underline; }

  .hint {
    margin: 4px 0;
    color: var(--muted);
    font-size: 0.875rem;
  }

  /* Error state */
  .error-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--error-soft);
    color: var(--error);
    font-size: 2rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 4px;
  }

  .error-msg {
    margin: 0;
    color: var(--text);
    font-size: 1rem;
    line-height: 1.5;
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(15, 23, 42, 0.95);
    color: white;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease, transform 200ms ease;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Larger viewport tweaks */
  @media (min-width: 480px) {
    .card { padding: 40px 32px; }
    h1.title { font-size: 1.75rem; }
    .instance-number { font-size: 3rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner { animation-duration: 2s; }
    .btn-primary:active, .btn-secondary:active, .btn-icon:active { transform: none; }
    .toast { transition: opacity 200ms ease; }
  }
</style>
</head>
<body>
  <main class="card" id="app" role="main">

    <section id="state-claim" class="state" aria-live="polite">
      <h1 class="title" id="title">ServiceNow Workshop</h1>
      <p class="subtitle" id="subtitle">Claim Your Demo Instance</p>
      <p class="instruction">Tap below to claim your demo instance.</p>
      <button id="claimBtn" class="btn-primary" type="button">Claim My Instance</button>
    </section>

    <section id="state-loading" class="state hidden" aria-live="polite">
      <div class="spinner" role="status" aria-label="Loading"></div>
      <p class="loading-msg" id="loadingMsg">Claiming your instance…</p>
    </section>

    <section id="state-result" class="state hidden" aria-live="polite">
      <div class="check" aria-hidden="true">✓</div>
      <p class="instance-label">Your Instance</p>
      <p class="instance-number" id="instanceNumber">000</p>

      <div class="field">
        <span class="field-label">URL</span>
        <a id="instanceUrl" class="field-value link" target="_blank" rel="noopener noreferrer">—</a>
      </div>

      <div class="field">
        <span class="field-label">Username</span>
        <span class="field-value mono" id="username">admin</span>
        <button id="copyUser" class="btn-icon" type="button" aria-label="Copy username">Copy</button>
      </div>

      <div class="field">
        <span class="field-label">Password</span>
        <span class="field-value mono" id="password">—</span>
        <button id="copyPwd" class="btn-icon" type="button" aria-label="Copy password">Copy</button>
      </div>

      <p class="hint">Tap the URL above to open your instance.</p>

      <button id="copyAll" class="btn-secondary" type="button">Copy All Details</button>
    </section>

    <section id="state-error" class="state hidden" aria-live="assertive">
      <div class="error-icon" aria-hidden="true">!</div>
      <p class="error-msg" id="errorMsg">Something went wrong.</p>
      <button id="retryBtn" class="btn-primary" type="button">Try Again</button>
    </section>

  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    /* =========================================================
       CONFIG — paste your deployed Apps Script web app URL below
       ========================================================= */
    const CONFIG = {
      APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzCYbrpUckqzRGMM0Q0lJfpu76EUzxpNOdLko-_S3Fi2jZwsp0GFW7Q4-IPBLmImD1b/exec',
      WORKSHOP_TITLE:  'ServiceNow Workshop',
      SUBTITLE:        'Claim Your Demo Instance',
      USERNAME:        'admin'
    };

    /* =========================================================
       Constants & state
       ========================================================= */
    const REQUEST_TIMEOUT_MS = 15000;
    const MAX_BUSY_RETRIES   = 3;
    const BUSY_RETRY_DELAY   = 1200;

    const els = {
      title:          document.getElementById('title'),
      subtitle:       document.getElementById('subtitle'),
      claim:          document.getElementById('state-claim'),
      loading:        document.getElementById('state-loading'),
      result:         document.getElementById('state-result'),
      error:          document.getElementById('state-error'),
      claimBtn:       document.getElementById('claimBtn'),
      retryBtn:       document.getElementById('retryBtn'),
      loadingMsg:     document.getElementById('loadingMsg'),
      errorMsg:       document.getElementById('errorMsg'),
      instanceNumber: document.getElementById('instanceNumber'),
      instanceUrl:    document.getElementById('instanceUrl'),
      username:       document.getElementById('username'),
      password:       document.getElementById('password'),
      copyUser:       document.getElementById('copyUser'),
      copyPwd:        document.getElementById('copyPwd'),
      copyAll:        document.getElementById('copyAll'),
      toast:          document.getElementById('toast')
    };

    let claimResult = null;
    let toastTimer  = null;

    /* =========================================================
       Init
       ========================================================= */
    document.addEventListener('DOMContentLoaded', () => {
      els.title.textContent    = CONFIG.WORKSHOP_TITLE;
      els.subtitle.textContent = CONFIG.SUBTITLE;
      els.username.textContent = CONFIG.USERNAME;
      document.title = CONFIG.WORKSHOP_TITLE + ' — ' + CONFIG.SUBTITLE;

      els.claimBtn.addEventListener('click', startClaim);
      els.retryBtn.addEventListener('click', startClaim);
      els.copyUser.addEventListener('click', () => copyText(CONFIG.USERNAME, els.copyUser));
      els.copyPwd.addEventListener('click', () => {
        if (claimResult) copyText(claimResult.password, els.copyPwd);
      });
      els.copyAll.addEventListener('click', () => {
        if (!claimResult) return;
        const block =
          'Instance: ' + claimResult.instanceNumber + '\n' +
          'URL: '      + claimResult.instanceUrl    + '\n' +
          'Username: ' + (claimResult.username || CONFIG.USERNAME) + '\n' +
          'Password: ' + claimResult.password;
        copyText(block, els.copyAll, 'Copied all details');
      });
    });

    /* =========================================================
       View state machine
       ========================================================= */
    function showState(name) {
      [els.claim, els.loading, els.result, els.error].forEach(s => s.classList.add('hidden'));
      const map = {
        claim:   els.claim,
        loading: els.loading,
        result:  els.result,
        error:   els.error
      };
      map[name].classList.remove('hidden');
    }

    /* =========================================================
       Claim flow
       ========================================================= */
    async function startClaim() {
      if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
        showError('App not configured yet. Please contact the workshop facilitator.');
        return;
      }

      els.claimBtn.disabled = true;
      els.loadingMsg.textContent = 'Claiming your instance…';
      showState('loading');

      try {
        const data = await claimWithBusyRetry();

        if (data && data.success) {
          claimResult = data;
          renderResult(data);
          showState('result');
        } else if (data && data.error) {
          showError(humanizeError(data.error));
        } else {
          showError('Unexpected response. Please try again.');
        }
      } catch (err) {
        if (err && err.name === 'AbortError') {
          showError('Request timed out. Check your wifi connection and try again.');
        } else if (err && err.message === 'BUSY_EXHAUSTED') {
          showError('Server is busy right now. Please try again in a moment.');
        } else {
          showError('Check your wifi connection and try again.');
        }
      } finally {
        els.claimBtn.disabled = false;
      }
    }

    async function claimWithBusyRetry() {
      let lastBusy = null;
      for (let attempt = 1; attempt <= MAX_BUSY_RETRIES; attempt++) {
        if (attempt > 1) {
          els.loadingMsg.textContent = 'Server busy, retrying… (' + attempt + '/' + MAX_BUSY_RETRIES + ')';
          await sleep(BUSY_RETRY_DELAY);
        }
        const data = await fetchClaim();
        if (data && data.success) return data;
        if (data && data.error && /busy/i.test(data.error)) {
          lastBusy = data;
          continue;
        }
        return data;
      }
      if (lastBusy) throw new Error('BUSY_EXHAUSTED');
      throw new Error('BUSY_EXHAUSTED');
    }

    async function fetchClaim() {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), REQUEST_TIMEOUT_MS);
      try {
        const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
          method:   'GET',
          redirect: 'follow',
          signal:   ctrl.signal,
          cache:    'no-store'
        });
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    /* =========================================================
       Render helpers
       ========================================================= */
    function renderResult(data) {
      els.instanceNumber.textContent = data.instanceNumber || '—';
      const url = data.instanceUrl || '#';
      els.instanceUrl.textContent = url;
      els.instanceUrl.setAttribute('href', url);
      els.username.textContent = data.username || CONFIG.USERNAME;
      els.password.textContent = data.password || '—';
    }

    function showError(msg) {
      els.errorMsg.textContent = msg;
      showState('error');
    }

    function humanizeError(serverError) {
      const e = String(serverError || '').toLowerCase();
      if (e.includes('all instances')) {
        return 'All instances have been claimed — please see the workshop facilitator.';
      }
      if (e.includes('busy')) {
        return 'Server is busy right now. Please try again in a moment.';
      }
      return serverError || 'Something went wrong. Please try again.';
    }

    /* =========================================================
       Clipboard + toast
       ========================================================= */
    async function copyText(text, btn, toastMsg) {
      const original = btn ? btn.textContent : null;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          legacyCopy(text);
        }
        if (btn) {
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = original; }, 1400);
        }
        showToast(toastMsg || 'Copied');
      } catch (e) {
        showToast('Copy failed — long-press to copy');
      }
    }

    function legacyCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-1000px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (!ok) throw new Error('execCommand failed');
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 1600);
    }

    /* =========================================================
       Utils
       ========================================================= */
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
