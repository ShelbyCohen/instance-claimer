<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050912">
<meta name="robots" content="noindex">
<title>ATF Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #050912;
    --bg-1: #0a1428;
    --card: rgba(18, 28, 50, 0.55);
    --card-border: rgba(255, 255, 255, 0.08);
    --card-border-bright: rgba(98, 216, 78, 0.35);
    --text: #ffffff;
    --text-soft: #cfd7e6;
    --muted: #7a8aa3;
    --accent: #62D84E;
    --accent-deep: #4ab337;
    --accent-2: #00C2D7;
    --accent-soft: rgba(98, 216, 78, 0.12);
    --accent-glow: rgba(98, 216, 78, 0.45);
    --error: #ff5e5e;
    --error-soft: rgba(255, 94, 94, 0.12);
    --radius: 22px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-0);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Animated mesh gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: -25%;
    z-index: -2;
    background:
      radial-gradient(circle at 20% 25%, rgba(98, 216, 78, 0.20) 0%, transparent 38%),
      radial-gradient(circle at 80% 75%, rgba(0, 194, 215, 0.18) 0%, transparent 42%),
      radial-gradient(circle at 50% 110%, rgba(98, 216, 78, 0.10) 0%, transparent 50%),
      var(--bg-1);
    animation: meshShift 22s ease-in-out infinite;
  }

  @keyframes meshShift {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50%      { transform: scale(1.08) rotate(2deg); }
  }

  /* Subtle dev-tool grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
    pointer-events: none;
  }

  .card {
    background: var(--card);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid var(--card-border);
    width: 100%;
    max-width: 460px;
    border-radius: var(--radius);
    padding: 36px 28px;
    box-shadow:
      0 24px 64px rgba(0, 0, 0, 0.55),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    animation: cardEnter 600ms cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .state {
    display: flex;
    flex-direction: column;
    gap: 14px;
    text-align: center;
    animation: stateEnter 320ms ease;
  }

  @keyframes stateEnter {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }

  .brand {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin: 0 auto;
  }

  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 14px var(--accent-glow);
    animation: brandPulse 2s ease-in-out infinite;
  }
  @keyframes brandPulse {
    0%, 100% { opacity: 0.55; transform: scale(0.85); }
    50%      { opacity: 1;    transform: scale(1.1); }
  }

  .eyebrow {
    color: var(--accent);
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin: 0;
  }

  h1.title {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.035em;
    line-height: 1.05;
    margin: 4px 0 0;
    background: linear-gradient(135deg, #ffffff 0%, #b9c4d6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Primary button — green gradient + shimmer */
  .btn-primary {
    appearance: none;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-weight: 700;
    font-size: 1.0625rem;
    letter-spacing: -0.01em;
    padding: 18px 24px;
    cursor: pointer;
    background: linear-gradient(135deg, #62D84E 0%, #4ab337 100%);
    color: #0a1428;
    box-shadow:
      0 10px 28px rgba(98, 216, 78, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
    transition: transform 120ms ease, box-shadow 220ms ease;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    margin-top: 16px;
    position: relative;
    overflow: hidden;
    isolation: isolate;
    /* Works for both <button> and <a> */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    text-align: center;
  }
  .btn-primary .arrow {
    display: inline-block;
    font-size: 1.25rem;
    font-weight: 700;
    transition: transform 200ms ease;
  }
  .btn-primary:hover .arrow { transform: translateX(3px); }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.35) 50%, transparent 65%);
    transform: translateX(-100%);
    transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
    z-index: -1;
  }
  .btn-primary:hover::before { transform: translateX(100%); }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow:
      0 14px 36px rgba(98, 216, 78, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-primary:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

  .btn-secondary {
    appearance: none;
    border: 1px solid var(--card-border);
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-soft);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-weight: 600;
    font-size: 0.9375rem;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
    margin-top: 4px;
  }

  /* Outline CTA — for "secondary primary" actions (e.g. open lab exercises) */
  .btn-outline {
    appearance: none;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
    padding: 16px 22px;
    cursor: pointer;
    transition: background 160ms ease, transform 100ms ease;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    margin-top: 8px;
  }
  .btn-outline:hover { background: var(--accent-soft); }
  .btn-outline:active { transform: scale(0.99); }
  .btn-outline:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-outline .arrow {
    display: inline-block;
    font-size: 1.25rem;
    font-weight: 700;
    transition: transform 200ms ease;
  }
  .btn-outline:hover .arrow { transform: translateX(3px); }

  /* Lab preview card (shown on the result screen, tappable to open the guide) */
  .preview-card-link {
    display: block;
    text-decoration: none;
    color: inherit;
    margin-top: 8px;
    border-radius: var(--radius-sm);
    -webkit-tap-highlight-color: transparent;
  }
  .preview-card-link:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .preview-card {
    background: rgba(98, 216, 78, 0.05);
    border: 1px solid rgba(98, 216, 78, 0.18);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    text-align: left;
    transition: background 200ms ease, border-color 200ms ease;
  }
  .preview-card-link:hover .preview-card {
    background: rgba(98, 216, 78, 0.10);
    border-color: rgba(98, 216, 78, 0.40);
  }
  .preview-card-link:hover .preview-arrow { transform: translateX(3px); }

  .preview-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin: 0 0 14px;
  }

  .preview-title {
    color: var(--text);
    font-size: 1.375rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin: 0;
    flex: 1;
  }

  .preview-arrow {
    color: var(--accent);
    font-size: 1.625rem;
    font-weight: 700;
    line-height: 1;
    transition: transform 200ms ease;
    display: inline-block;
  }

  .preview-steps {
    list-style: none;
    padding: 0;
    margin: 0;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .preview-steps li {
    color: var(--text-soft);
    font-size: 0.8125rem;
    line-height: 1.45;
    padding-left: 28px;
    position: relative;
    counter-increment: step;
  }

  .preview-steps li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    top: 1px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(98, 216, 78, 0.18);
    color: var(--accent);
    font-size: 0.625rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Used for the lazy-revealed preview on the loading state */
  .fade-in-up {
    animation: fadeInUp 600ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--card-border-bright);
    color: var(--text);
  }
  .btn-secondary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-icon {
    appearance: none;
    border: 1px solid var(--card-border);
    background: rgba(255, 255, 255, 0.05);
    color: var(--accent);
    font-family: inherit;
    font-size: 0.6875rem;
    font-weight: 700;
    padding: 6px 11px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 150ms ease, border-color 150ms ease;
    -webkit-tap-highlight-color: transparent;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .btn-icon:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .btn-icon:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Loading dots */
  .loader {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    margin: 20px auto 4px;
  }
  .loader span {
    width: 11px;
    height: 11px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 16px var(--accent-glow);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .loader span:nth-child(2) { animation-delay: 0.15s; }
  .loader span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.7); }
    40%           { opacity: 1;   transform: scale(1); }
  }

  .loading-msg {
    color: var(--muted);
    font-size: 0.9375rem;
    margin: 0;
  }

  /* Result — animated checkmark */
  .check-wrap {
    margin: 8px auto 4px;
    width: 76px;
    height: 76px;
    position: relative;
  }
  .check-circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 36px var(--accent-glow);
    animation: checkPop 480ms cubic-bezier(0.2, 0.9, 0.3, 1.4);
  }
  @keyframes checkPop {
    0%   { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  .check-svg {
    width: 34px;
    height: 34px;
    stroke: var(--accent);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 30;
    stroke-dashoffset: 30;
    animation: checkDraw 450ms 220ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes checkDraw { to { stroke-dashoffset: 0; } }

  /* Instance number inline on the primary button */
  .instance-num {
    font-variant-numeric: tabular-nums;
    font-weight: 800;
  }

  /* Subtle confirmation tag below the checkmark */
  .claimed-tag {
    color: var(--muted);
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-weight: 700;
    margin: 6px 0 0;
  }

  .field {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: left;
    transition: border-color 160ms ease, background 160ms ease;
  }
  .field:hover {
    border-color: var(--card-border-bright);
    background: rgba(255, 255, 255, 0.045);
  }

  .field-label {
    color: var(--muted);
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
    flex-shrink: 0;
    width: 56px;
  }

  .field-value {
    flex: 1;
    color: var(--text);
    font-size: 0.875rem;
    word-break: break-all;
    min-width: 0;
  }
  .field-value.mono {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.875rem;
    letter-spacing: -0.01em;
  }

  a.link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  a.link:hover { text-decoration: underline; }

  /* Error */
  .error-icon {
    margin: 8px auto 4px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--error-soft);
    border: 2px solid var(--error);
    color: var(--error);
    font-size: 1.75rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .error-msg {
    color: var(--text-soft);
    font-size: 0.9375rem;
    line-height: 1.5;
    margin: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20, 30, 56, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease, transform 200ms ease;
    z-index: 100;
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (min-width: 480px) {
    .card { padding: 44px 36px; }
    h1.title { font-size: 3rem; }
    .instance-number { font-size: 4rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <main class="card" id="app" role="main">

    <section id="state-claim" class="state" aria-live="polite">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="eyebrow" id="eyebrow">WORKSHOP</span>
      </div>
      <h1 class="title" id="title">ATF Lab</h1>
      <button id="claimBtn" class="btn-primary" type="button">Claim my instance</button>
    </section>

    <section id="state-loading" class="state hidden" aria-live="polite">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="eyebrow">Claiming</span>
      </div>
      <div class="loader" role="status" aria-label="Loading">
        <span></span><span></span><span></span>
      </div>
      <p class="loading-msg" id="loadingMsg">Spinning up your instance…</p>

      <a id="loadingPreviewLink" class="preview-card-link hidden" target="_blank" rel="noopener noreferrer">
        <div class="preview-card">
          <div class="preview-title-row">
            <h3 id="loadingPreviewTitle" class="preview-title">Today's lab</h3>
            <span class="preview-arrow" aria-hidden="true">↗</span>
          </div>
          <ul id="loadingPreviewSteps" class="preview-steps"></ul>
        </div>
      </a>
    </section>

    <section id="state-result" class="state hidden" aria-live="polite">
      <div class="check-wrap" aria-hidden="true">
        <div class="check-circle">
          <svg class="check-svg" viewBox="0 0 24 24" focusable="false">
            <polyline points="5,12 10,17 19,7"></polyline>
          </svg>
        </div>
      </div>
      <p class="claimed-tag">You're in</p>

      <a id="instanceBtn" class="btn-primary" target="_blank" rel="noopener noreferrer">
        <span>Open instance <span id="instanceNumber" class="instance-num">0</span></span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <div class="field">
        <span class="field-label">User</span>
        <span class="field-value mono" id="username">admin</span>
        <button id="copyUser" class="btn-icon" type="button" aria-label="Copy username">Copy</button>
      </div>

      <div class="field">
        <span class="field-label">Pass</span>
        <span class="field-value mono" id="password">—</span>
        <button id="copyPwd" class="btn-icon" type="button" aria-label="Copy password">Copy</button>
      </div>

      <a id="exercisesPreviewLink" class="preview-card-link hidden" target="_blank" rel="noopener noreferrer">
        <div class="preview-card">
          <div class="preview-title-row">
            <h3 id="previewTitle" class="preview-title">Today's lab</h3>
            <span class="preview-arrow" aria-hidden="true">↗</span>
          </div>
          <ul id="previewSteps" class="preview-steps"></ul>
        </div>
      </a>

      <a id="exercisesBtn" class="btn-outline hidden" target="_blank" rel="noopener noreferrer">
        <span id="exercisesLabel">Open lab exercises</span><span class="arrow" aria-hidden="true">↗</span>
      </a>
    </section>

    <section id="state-error" class="state hidden" aria-live="assertive">
      <div class="error-icon" aria-hidden="true">!</div>
      <p class="error-msg" id="errorMsg">Something went wrong.</p>
      <button id="retryBtn" class="btn-primary" type="button">Try again</button>
    </section>

  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    /* =========================================================
       CONFIG — paste your deployed Apps Script web app URL below
       ========================================================= */
    const CONFIG = {
      APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzCYbrpUckqzRGMM0Q0lJfpu76EUzxpNOdLko-_S3Fi2jZwsp0GFW7Q4-IPBLmImD1b/exec',
      TITLE:           'ATF Lab',
      EYEBROW:         'WORKSHOP',
      USERNAME:        'admin',
      EXERCISES_URL:   'https://bit.ly/atf-workshop',
      EXERCISES_LABEL: 'Open lab exercises',  // Used only when LAB_PREVIEW is null

      // Shows a tappable preview of today's lab. The entire card links to
      // EXERCISES_URL. Set to `null` to fall back to a plain "Open lab
      // exercises" button instead.
      LAB_PREVIEW: {
        TITLE: 'Today\'s lab',
        STEPS: [
          'Reusable Tests',
          'Configurable Workspace Testing',
          'Code Coverage',
          'Test Agent: Conversational Authoring',
          'Test Agent: Autonomous Flow'
        ]
      },

      // After this many ms in the loading state, the lab preview fades in
      // so a slow claim has something to read. Fast claims never see it.
      LOADING_PREVIEW_DELAY_MS: 8000
    };

    /* =========================================================
       Constants & state
       ========================================================= */
    const REQUEST_TIMEOUT_MS = 20000;   // > backend lock timeout (15s)
    const MAX_BUSY_RETRIES   = 3;
    const BUSY_RETRY_DELAY   = 1500;

    // Cycling status messages while loading — gives the wait some texture
    const LOADING_MESSAGES = [
      'Locating an available sandbox…',
      'Reserving your instance…',
      'Configuring admin credentials…',
      'Connecting to ServiceNow…',
      'Almost ready…'
    ];
    const LOADING_MESSAGE_INTERVAL = 2400;

    const els = {
      title:          document.getElementById('title'),
      eyebrow:        document.getElementById('eyebrow'),
      claim:          document.getElementById('state-claim'),
      loading:        document.getElementById('state-loading'),
      result:         document.getElementById('state-result'),
      error:          document.getElementById('state-error'),
      claimBtn:       document.getElementById('claimBtn'),
      retryBtn:       document.getElementById('retryBtn'),
      loadingMsg:        document.getElementById('loadingMsg'),
      errorMsg:          document.getElementById('errorMsg'),
      instanceNumber:    document.getElementById('instanceNumber'),
      instanceBtn:       document.getElementById('instanceBtn'),
      username:          document.getElementById('username'),
      password:          document.getElementById('password'),
      copyUser:          document.getElementById('copyUser'),
      copyPwd:           document.getElementById('copyPwd'),
      exercisesPreviewLink: document.getElementById('exercisesPreviewLink'),
      previewTitle:      document.getElementById('previewTitle'),
      previewSteps:      document.getElementById('previewSteps'),
      loadingPreviewLink: document.getElementById('loadingPreviewLink'),
      loadingPreviewTitle: document.getElementById('loadingPreviewTitle'),
      loadingPreviewSteps: document.getElementById('loadingPreviewSteps'),
      exercisesBtn:      document.getElementById('exercisesBtn'),
      exercisesLabel:    document.getElementById('exercisesLabel'),
      toast:             document.getElementById('toast')
    };

    let claimResult         = null;
    let toastTimer          = null;
    let loadingMsgTimer     = null;
    let loadingPreviewTimer = null;

    /* =========================================================
       Init
       ========================================================= */
    document.addEventListener('DOMContentLoaded', () => {
      els.title.textContent    = CONFIG.TITLE;
      els.eyebrow.textContent  = CONFIG.EYEBROW;
      els.username.textContent = CONFIG.USERNAME;
      document.title = CONFIG.TITLE;

      // Result + loading-state previews share the same content. Render once,
      // populate both DOM copies. Visibility is handled per-state:
      //   - result: shown immediately when claim succeeds
      //   - loading: hidden by default, fades in after LOADING_PREVIEW_DELAY_MS
      if (CONFIG.EXERCISES_URL && CONFIG.LAB_PREVIEW) {
        const p = CONFIG.LAB_PREVIEW;
        const title = p.TITLE || 'Today\'s lab';
        els.previewTitle.textContent        = title;
        els.loadingPreviewTitle.textContent = title;

        renderPreviewSteps(els.previewSteps,        p.STEPS);
        renderPreviewSteps(els.loadingPreviewSteps, p.STEPS);

        els.exercisesPreviewLink.setAttribute('href',  CONFIG.EXERCISES_URL);
        els.loadingPreviewLink.setAttribute('href',    CONFIG.EXERCISES_URL);
        els.exercisesPreviewLink.classList.remove('hidden');
      } else if (CONFIG.EXERCISES_URL) {
        els.exercisesBtn.setAttribute('href', CONFIG.EXERCISES_URL);
        els.exercisesLabel.textContent = CONFIG.EXERCISES_LABEL || 'Open lab exercises';
        els.exercisesBtn.classList.remove('hidden');
      }

      function renderPreviewSteps(ul, steps) {
        if (!ul || !Array.isArray(steps)) return;
        ul.innerHTML = '';
        for (const step of steps) {
          const li = document.createElement('li');
          li.textContent = step;
          ul.appendChild(li);
        }
      }

      // Pre-warm the Apps Script runtime so the first real claim is fast.
      // Best-effort — silently ignore network failures.
      preWarm();

      els.claimBtn.addEventListener('click', startClaim);
      els.retryBtn.addEventListener('click', startClaim);
      els.copyUser.addEventListener('click', () => copyText(CONFIG.USERNAME, els.copyUser));
      els.copyPwd.addEventListener('click', () => {
        if (claimResult) copyText(claimResult.password, els.copyPwd);
      });

      // Auto-copy password to clipboard when the user taps "Open instance",
      // so they can paste it straight into ServiceNow's login form. The
      // anchor's default behaviour still opens the instance in a new tab.
      els.instanceBtn.addEventListener('click', () => {
        if (!claimResult || !claimResult.password) return;
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(claimResult.password).catch(() => {});
        } else {
          try { legacyCopy(claimResult.password); } catch (_) {}
        }
        showToast('Password copied — type admin and paste');
      });
    });

    /* =========================================================
       View state machine
       ========================================================= */
    function showState(name) {
      [els.claim, els.loading, els.result, els.error].forEach(s => s.classList.add('hidden'));
      const map = {
        claim:   els.claim,
        loading: els.loading,
        result:  els.result,
        error:   els.error
      };
      map[name].classList.remove('hidden');

      if (name === 'loading') startLoadingMessages();
      else                    stopLoadingMessages();
    }

    function startLoadingMessages() {
      stopLoadingMessages();
      let idx = 0;
      els.loadingMsg.textContent = LOADING_MESSAGES[0];
      loadingMsgTimer = setInterval(() => {
        idx = (idx + 1) % LOADING_MESSAGES.length;
        els.loadingMsg.textContent = LOADING_MESSAGES[idx];
      }, LOADING_MESSAGE_INTERVAL);

      // Lazy-reveal the lab preview only if the wait drags on. Fast claims
      // never see this; slow ones get something to read after ~8 seconds.
      const delay = CONFIG.LOADING_PREVIEW_DELAY_MS || 8000;
      if (els.loadingPreviewLink && CONFIG.EXERCISES_URL && CONFIG.LAB_PREVIEW) {
        loadingPreviewTimer = setTimeout(() => {
          els.loadingPreviewLink.classList.remove('hidden');
          els.loadingPreviewLink.classList.add('fade-in-up');
        }, delay);
      }
    }

    function stopLoadingMessages() {
      if (loadingMsgTimer) {
        clearInterval(loadingMsgTimer);
        loadingMsgTimer = null;
      }
      if (loadingPreviewTimer) {
        clearTimeout(loadingPreviewTimer);
        loadingPreviewTimer = null;
      }
      // Reset the loading preview so it's hidden again next time
      if (els.loadingPreviewLink) {
        els.loadingPreviewLink.classList.add('hidden');
        els.loadingPreviewLink.classList.remove('fade-in-up');
      }
    }

    /* =========================================================
       Pre-warm — wakes up the Apps Script runtime before the
       user taps Claim, so the first real request is faster.
       ========================================================= */
    function preWarm() {
      if (!CONFIG.APPS_SCRIPT_URL) return;
      const sep = CONFIG.APPS_SCRIPT_URL.includes('?') ? '&' : '?';
      const url = CONFIG.APPS_SCRIPT_URL + sep + 'ping=1';
      fetch(url, { method: 'GET', redirect: 'follow', cache: 'no-store' })
        .catch(() => {});
    }

    /* =========================================================
       Claim flow
       ========================================================= */
    async function startClaim() {
      if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
        showError('App not configured yet. Please contact the workshop facilitator.');
        return;
      }

      els.claimBtn.disabled = true;
      showState('loading');

      try {
        const data = await claimWithBusyRetry();

        if (data && data.success) {
          claimResult = data;
          renderResult(data);
          showState('result');
        } else if (data && data.error) {
          showError(humanizeError(data.error));
        } else {
          showError('Unexpected response. Please try again.');
        }
      } catch (err) {
        if (err && err.name === 'AbortError') {
          showError('Request timed out. Check your wifi connection and try again.');
        } else if (err && err.message === 'BUSY_EXHAUSTED') {
          showError('Lots of people claiming right now. Tap Try Again in a moment.');
        } else {
          showError('Check your wifi connection and try again.');
        }
      } finally {
        els.claimBtn.disabled = false;
      }
    }

    async function claimWithBusyRetry() {
      let lastBusy = null;
      for (let attempt = 1; attempt <= MAX_BUSY_RETRIES; attempt++) {
        if (attempt > 1) {
          els.loadingMsg.textContent = 'Server busy, retrying… (' + attempt + '/' + MAX_BUSY_RETRIES + ')';
          await sleep(BUSY_RETRY_DELAY);
        }
        const data = await fetchClaim();
        if (data && data.success) return data;
        if (data && data.error && /busy/i.test(data.error)) {
          lastBusy = data;
          continue;
        }
        return data;
      }
      if (lastBusy) throw new Error('BUSY_EXHAUSTED');
      throw new Error('BUSY_EXHAUSTED');
    }

    async function fetchClaim() {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), REQUEST_TIMEOUT_MS);
      try {
        const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
          method:   'GET',
          redirect: 'follow',
          signal:   ctrl.signal,
          cache:    'no-store'
        });
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    /* =========================================================
       Render helpers
       ========================================================= */
    function renderResult(data) {
      els.instanceNumber.textContent = formatInstanceNumber(data.instanceNumber);
      els.instanceBtn.setAttribute('href', data.instanceUrl || '#');
      els.username.textContent = data.username || CONFIG.USERNAME;
      els.password.textContent = data.password || '—';
    }

    // "001" → "1", "042" → "42", "000" → "0", "BASE" → "BASE"
    function formatInstanceNumber(raw) {
      const stripped = String(raw == null ? '' : raw).replace(/^0+/, '');
      return stripped || '0';
    }

    function showError(msg) {
      els.errorMsg.textContent = msg;
      showState('error');
    }

    function humanizeError(serverError) {
      const e = String(serverError || '').toLowerCase();
      if (e.includes('all instances')) {
        return 'All instances have been claimed — please see the workshop facilitator.';
      }
      if (e.includes('busy')) {
        return 'Server is busy right now. Please try again in a moment.';
      }
      return serverError || 'Something went wrong. Please try again.';
    }

    /* =========================================================
       Clipboard + toast
       ========================================================= */
    async function copyText(text, btn, toastMsg) {
      const original = btn ? btn.textContent : null;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          legacyCopy(text);
        }
        if (btn) {
          btn.textContent = 'Copied';
          setTimeout(() => { btn.textContent = original; }, 1400);
        }
        showToast(toastMsg || 'Copied');
      } catch (e) {
        showToast('Copy failed — long-press to copy');
      }
    }

    function legacyCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-1000px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (!ok) throw new Error('execCommand failed');
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 1600);
    }

    /* =========================================================
       Utils
       ========================================================= */
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
